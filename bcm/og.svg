<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="t d">
  <title id="t">Barbourian Connectivity Model</title>
  <desc id="d">Nothing travels. Nature contains no time, only connections. Choi Namhee, 2026.</desc>
  <defs>
    <style>
      .bg{ fill:#000; }
      .ink{ fill:#fff; }
      .muted{ fill:rgba(255,255,255,.55); }
      .line{ stroke:rgba(255,255,255,.22); stroke-width:1; }
      .h1{ font-family:'Helvetica Neue','Pretendard','Inter','Arial',sans-serif; font-weight:900; font-size:104px; letter-spacing:-3.2px; }
      .h2{ font-family:'Helvetica Neue','Pretendard','Inter','Arial',sans-serif; font-weight:900; font-size:104px; letter-spacing:-3.2px; }
      .lede{ font-family:'Helvetica Neue','Pretendard','Inter','Arial',sans-serif; font-weight:400; font-size:34px; letter-spacing:-0.6px; }
      .eyebrow{ font-family:'Helvetica Neue','Inter','Arial',sans-serif; font-weight:700; font-size:18px; letter-spacing:3px; text-transform:uppercase; }
      .meta{ font-family:'Helvetica Neue','Inter','Arial',sans-serif; font-weight:600; font-size:20px; letter-spacing:0.5px; }
      .mono{ font-family:ui-monospace,'JetBrains Mono','SF Mono',monospace; font-weight:600; font-size:16px; letter-spacing:1px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- top eyebrow -->
  <text class="eyebrow muted" x="80" y="92">BARBOURIAN CONNECTIVITY MODEL · BCM v2.0</text>
  <line class="line" x1="80" y1="118" x2="1120" y2="118"/>

  <!-- big title -->
  <text class="h1 ink" x="80" y="280">Nothing</text>
  <text class="h1 ink" x="80" y="395">travels.</text>

  <!-- lede -->
  <text class="lede ink" x="80" y="475">No time. Only connections.</text>
  <text class="lede muted" x="80" y="515">시간은 없다. 연결만 있다.</text>

  <!-- bottom meta strip -->
  <line class="line" x1="80" y1="555" x2="1120" y2="555"/>
  <text class="mono muted" x="80" y="590">CHOI NAMHEE · 17 MAY 2026 · RATEL &amp; PARTNERS / CRE8ORCLUB</text>
  <text class="mono muted" x="1120" y="590" text-anchor="end">#QUANTUM #BCM</text>
</svg>
